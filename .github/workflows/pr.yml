name: TLA+ PR Validation
on: [pull_request]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tlatools-build-and-test:
    name: TLA+ Tools Build & Test
    runs-on: ${{ matrix.operating-system }}
    permissions:
      checks: write # Required by mikepenz/action-junit-report@v4
    strategy:
      matrix:
        operating-system: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - name: Configure LF line endings in git
      # Git on Windows defaults to core.autocrlf=true, which checks out
      # files with CRLF line endings.  The generate target in customBuild.xml
      # normalizes JavaCC output to LF via fixcrlf, so checked-out files must
      # also be LF for the grammar/code sync check (git status) to pass.
      if: matrix.operating-system == 'windows-latest'
      run: git config --global core.autocrlf input
    - name: Clone tlaplus/tlaplus
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        # Number of commits to fetch. 0 indicates all history.
        # jgit task nested in customBuild.xml fails without history.
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: adopt
        java-version: 17
    - name: Check tla+.jj grammar/code sync
      shell: bash
      run: |
        ant -f tlatools/org.lamport.tlatools/customBuild.xml generate
        git status
        diff_count=$(git status --porcelain=v1 2>/dev/null | wc -l)
        exit $diff_count
    ##
    ## The following process first compiles and packages (dist) the tla2tools.jar file. Next, it 
    ## runs the test suite in parallel, aborting the run and failing the workflow upon the first
    ## test failure (test.halt=true). Regardless of any test failures, a JUnitReport is generated.
    ## Both the report and the test results (in XML format) are uploaded as workflow artifacts for
    ## potential local download and further analysis. Additionally, mikepenz/action-junit-report
    ## publishes the stack traces from the test results. If desired, the test.halt setting can be
    ## removed to allow the test suite to run to completion.
    ## (The same sequence of steps is executed by main.yml)
    ## 
    - name: Build tools and unit tests
      run: ant -f tlatools/org.lamport.tlatools/customBuild.xml info compile compile-test dist
    - name: Run unit tests
      shell: bash
      run: |
        ant -f tlatools/org.lamport.tlatools/customBuild.xml info test -Dtest.halt=true
    - name: Generate JUnitReport
      if: always()
      run: ant -f tlatools/org.lamport.tlatools/customBuild.xml test-report
    - name: Upload raw unit test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
          ## Name of the artifact to upload (discriminated by os to prevent name conflicts).
          name: testresults-${{ matrix.operating-system }}
          path: |
            tlatools/org.lamport.tlatools/target/surefire-reports/TEST-*.xml
            tlatools/org.lamport.tlatools/target/surefire-reports/TESTS-TestSuites.xml
            tlatools/org.lamport.tlatools/target/surefire-reports/junit-noframes.html
    - name: Publish unit test results
      uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
      if: always()
      # Check-run creation requires checks:write, which the GITHUB_TOKEN lacks
      # for fork PRs. The job summary is still produced before that step fails.
      continue-on-error: true
      with:
          check_name: JUnit Test Report on ${{ matrix.operating-system }}
          report_paths: 'tlatools/org.lamport.tlatools/target/surefire-reports/TEST-*.xml'
    - name: Upload tla2tools.jar
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: matrix.operating-system == 'ubuntu-latest'
      with:
          name: tla2tools
          path: tlatools/org.lamport.tlatools/dist/tla2tools.jar
    - name: Clone tlaplus/CommunityModules
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: tlaplus/CommunityModules
        path: communitymodules/
        # Number of commits to fetch. 0 indicates all history.
        # jgit task nested in customBuild.xml fails without history.
        fetch-depth: 0
    - name: Build Community Modules as Integration Test
      shell: bash
      run: |
        mkdir -p communitymodules/tlc
        cp tlatools/org.lamport.tlatools/dist/tla2tools.jar communitymodules/tlc/
        ant -f communitymodules/build.xml -Dskip.download=true   

  jpf-verify:
    name: JPF Verification Tests
    runs-on: ubuntu-latest
    steps:
    - name: Clone tlaplus/tlaplus
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        fetch-depth: 0
    - name: Set up JDK 11
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        ## JPF requires Java 11.
        distribution: 'adopt'
        java-version: '11'
    - name: Compile and run JPF verification tests
      run: ant -f tlatools/org.lamport.tlatools/customBuild.xml info compile compile-test test-verify

  toolbox-build-and-test:
    name: Eclipse Toolbox Build & Test
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        include:
          - operating-system: ubuntu-latest
            MVN_COMMAND: xvfb-run mvn -Dtest.skip=true -Dmaven.test.failure.ignore=true 
          - operating-system: macos-latest
            MVN_COMMAND: mvn -Dmaven.test.skip=true
      fail-fast: false
    steps:
    - name: Clone tlaplus/tlaplus
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        # Number of commits to fetch. 0 indicates all history.
        # jgit task nested in customBuild.xml fails without history.
        fetch-depth: 0
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: adopt
        java-version: 17
    - name: Build & Test Eclipse Toolbox with Maven
      run: |
        ${{ matrix.MVN_COMMAND }}                                                                     \
          -Dtycho.disableP2Mirrors=true                                                               \
          -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn  \
          -fae -B verify --file pom.xml

    - name: Upload Toolbox Artifacts (zip files)
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: matrix.operating-system == 'macos-latest' ## This avoids a name clash (TLAToolboxes) between matrix runners. The macOS runner also builds the Windows and Linux zip files.
      with:
        name: TLAToolboxes
        path: toolbox/org.lamport.tla.toolbox.product.product/target/products/*.zip

  examples-tests:
    name: Examples Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - unicode: true
          - unicode: false
    env:
      EXAMPLES_DIR: "examples"
      SCRIPT_DIR: "examples/.github/scripts"
      DEPS_DIR: "examples/deps"
      DIST_DIR: "tlatools/org.lamport.tlatools/dist"
    steps:
    - name: Clone tlaplus/tlaplus
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        # Number of commits to fetch. 0 indicates all history.
        # jgit task nested in customBuild.xml fails without history.
        fetch-depth: 0
    - name: Clone tlaplus/examples
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: tlaplus/examples
        path: ${{ env.EXAMPLES_DIR }}
    - name: Set up JDK 17
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
      with:
        distribution: adopt
        java-version: 17
    - name: Build tla2tools.jar
      run: ant -f tlatools/org.lamport.tlatools/customBuild.xml compile compile-test dist
    - name: Download dependencies
      run: |
        "$SCRIPT_DIR/linux-setup.sh" "$SCRIPT_DIR" "$DEPS_DIR" false
    - name: Convert specs to unicode
      if: matrix.unicode
      run: |
        python "$SCRIPT_DIR/unicode_conversion.py"  \
          --tlauc_path "$DEPS_DIR/tlauc/tlauc"      \
          --examples_root "$EXAMPLES_DIR"
    - name: Translate PlusCal
      run: |
        python $SCRIPT_DIR/translate_pluscal.py         \
          --tools_jar_path "$DIST_DIR/tla2tools.jar"    \
          --examples_root "$EXAMPLES_DIR"               \
          --enable_assertions
    - name: Parse tlaplus/examples modules
      run: |
        # Skip Einstein.tla to avoid dependency on Apalache
        python "$SCRIPT_DIR/parse_modules.py"                             \
          --verbose                                                       \
          --tools_jar_path "$DIST_DIR/tla2tools.jar"                      \
          --apalache_path "$DEPS_DIR/apalache"                            \
          --tlapm_lib_path "$DEPS_DIR/tlapm/library"                      \
          --community_modules_jar_path "$DEPS_DIR/community/modules.jar"  \
          --skip "specifications/EinsteinRiddle/Einstein.tla"             \
          --examples_root "$EXAMPLES_DIR"                                 \
          --enable_assertions
    - name: Run XMLExporter on tlaplus/examples modules
      run: |
        set -o pipefail
        find "$EXAMPLES_DIR/specifications" \
        -type f -iname "*.tla" -not -name "Einstein.tla" -and -not -name "*_TTrace_*.tla" -print0 |
        xargs --verbose --null --no-run-if-empty --max-procs=$(nproc) --replace={TLA_FILE} sh -c \
        'java -cp "'"$DIST_DIR/tla2tools.jar:$DEPS_DIR/community/modules.jar:$DEPS_DIR/apalache/lib/apalache.jar"'" \
        tla2sany.xml.XMLExporter -I "$(dirname "{TLA_FILE}")" -I "'"$DEPS_DIR/tlapm/library"'" "{TLA_FILE}"' > /dev/null
    - name: Model-check small tlaplus/examples models
      run: |
        SKIP=(
          # https://github.com/tlaplus/Examples/issues/134
          "specifications/ewd998/EWD998ChanTrace.cfg"
          # https://github.com/tlaplus/tlaplus/issues/1045
          "specifications/FiniteMonotonic/MCDistributedReplicatedLog.cfg"
          # https://github.com/tlaplus/tlaplus/issues/1353
          "specifications/EinsteinRiddle/Einstein.cfg"
        )
        # Apalache does not yet support Unicode specs:
        # https://github.com/apalache-mc/apalache/issues/2995
        APALACHE_FLAG=()
        if [ "${{ matrix.unicode }}" = "true" ]; then
          APALACHE_FLAG+=("--skip_apalache")
        fi
        python "$SCRIPT_DIR/check_small_models.py"                        \
          --verbose                                                       \
          --tools_jar_path "$DIST_DIR/tla2tools.jar"                      \
          --apalache_path "$DEPS_DIR/apalache"                            \
          --tlapm_lib_path "$DEPS_DIR/tlapm/library"                      \
          --community_modules_jar_path "$DEPS_DIR/community/modules.jar"  \
          --examples_root "$EXAMPLES_DIR"                                 \
          --enable_assertions                                             \
          --skip "${SKIP[@]}"                                             \
          "${APALACHE_FLAG[@]}"
    - name: Smoke-test large tlaplus/examples models
      run: |
        # SimKnuthYao requires certain number of states to have been generated
        # before termination or else it fails. This makes it not amenable to
        # smoke testing.
        python "$SCRIPT_DIR/smoke_test_large_models.py"                   \
          --verbose                                                       \
          --tools_jar_path "$DIST_DIR/tla2tools.jar"                      \
          --apalache_path "$DEPS_DIR/apalache"                            \
          --tlapm_lib_path "$DEPS_DIR/tlapm/library"                      \
          --community_modules_jar_path "$DEPS_DIR/community/modules.jar"  \
          --examples_root "$EXAMPLES_DIR"                                 \
          --enable_assertions                                             \
          --skip "specifications/KnuthYao/SimKnuthYao.cfg"
    - name: Run formatter TLAPS-dependent tests
      if: ${{ !matrix.unicode }}
      run: |
        TLAPM_LIB="${{ github.workspace }}/${{ env.DEPS_DIR }}/tlapm/library"
        CM_JAR="${{ github.workspace }}/${{ env.DEPS_DIR }}/community/modules.jar"
        if [ -d "$TLAPM_LIB" ] && [ -f "$CM_JAR" ]; then
          mkdir -p community-modules-tla
          cd community-modules-tla && jar xf "$CM_JAR" && cd ..
          ant -f tlatools/org.lamport.tlatools/customBuild.xml test-formatter-tlaps \
            -DTLA-Library="${TLAPM_LIB}:${{ github.workspace }}/community-modules-tla"
        else
          echo "::notice::Skipping formatter TLAPS tests (tlapm or CommunityModules not available)"
        fi
    - name: Test formatter on all specs in Examples repo
      if: ${{ !matrix.unicode }}
      run: |
        git clone --depth 1 https://github.com/apalache-mc/apalache.git apalache-src
        ant -f tlatools/org.lamport.tlatools/customBuild.xml test-formatter-semantic \
          -Dtlaplus.examples.path="${{ github.workspace }}/${{ env.EXAMPLES_DIR }}" \
          -DTLA-Library="${{ github.workspace }}/${{ env.DEPS_DIR }}/tlapm/library:${{ github.workspace }}/community-modules-tla:${{ github.workspace }}/apalache-src/src/tla"
    - name: Upload formatter test results
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: always()
      with:
        name: formatter-semantic-results-${{ matrix.unicode && 'unicode' || 'ascii' }}
        path: |
          tlatools/org.lamport.tlatools/target/surefire-reports/TEST-formatter.TlaPlusExamplesSemanticPreservationTest.xml
          tlatools/org.lamport.tlatools/target/surefire-reports/TEST-formatter.constructs.impl.ProofConstructTest.xml
          tlatools/org.lamport.tlatools/target/surefire-reports/TEST-formatter.constructs.impl.PickStepConstructTest.xml
          tlatools/org.lamport.tlatools/target/surefire-reports/TEST-formatter.constructs.impl.ExtendsConstructTest.xml
